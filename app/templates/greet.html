<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Greeting – PaaS Lab</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #e2e8f0; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .container {
            max-width: 560px; width: 90%; padding: 2.5rem;
            background: rgba(30, 41, 59, 0.85);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 1rem;
        }
        h2 { color: #818cf8; margin-bottom: 1rem; }
        .greeting-box {
            background: rgba(15, 23, 42, 0.6); padding: 1.5rem;
            border-radius: 0.75rem; border-left: 3px solid #4ade80;
            margin-bottom: 1rem;
        }
        .greeting-box p { font-size: 1.1rem; line-height: 1.6; }
        .meta { font-size: 0.85rem; color: #94a3b8; margin-bottom: 0.5rem; }
        .badge {
            display: inline-block; padding: 0.2rem 0.6rem;
            border-radius: 999px; font-size: 0.75rem; font-weight: 600;
        }
        .positive { background: rgba(34,197,94,0.15); color: #4ade80; }
        .negative { background: rgba(239,68,68,0.15); color: #f87171; }
        .neutral  { background: rgba(245,158,11,0.15); color: #fbbf24; }
        .ai-tag {
            display: inline-block; padding: 0.2rem 0.6rem;
            background: rgba(99,102,241,0.15); color: #818cf8;
            border-radius: 999px; font-size: 0.75rem; font-weight: 600;
            margin-left: 0.4rem;
        }
        a { color: #818cf8; text-decoration: none; font-size: 0.85rem; }
        .links { margin-top: 1.5rem; }
        .links a { margin-right: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h2>👋 Your Personalised Greeting</h2>

        <div class="greeting-box">
            <p>{{ result.greeting }}</p>
        </div>

        <p class="meta">
            Sentiment detected:
            <span class="badge {{ result.sentiment }}">{{ result.sentiment | capitalize }}</span>
            {% if result.ai_powered %}
                <span class="ai-tag">AI Powered</span>
            {% else %}
                <span class="ai-tag">Keyword Analysis</span>
            {% endif %}
        </p>
        <p class="meta">Your input: <em>"{{ user_input }}"</em></p>

        <div class="links">
            <a href="/greet">← Try Again</a>
            <a href="/">Home</a>
        </div>
    </div>
</body>
</html>
